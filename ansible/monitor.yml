---
# =============================================================================
# EdgePaaS Monitoring Tasks (Prometheus, Node Exporter, Grafana)
# =============================================================================

- name: Ensure monitoring directories exist on Docker volume
  file:
    path: "{{ DOCKER_VOLUME }}/{{ item }}"
    state: directory
    owner: deploy
    group: deploy
    mode: '0755'
  loop:
    - "{{ DASHBOARDS_DIR }}"
    - "{{ PROVISIONING_DIR }}"
    - "{{ PROMETHEUS_TARGETS_DIR }}"

- name: Set full paths for monitoring directories
  set_fact:
    DASHBOARDS_DIR: "{{ DOCKER_VOLUME }}/{{ DASHBOARDS_DIR }}"
    PROVISIONING_DIR: "{{ DOCKER_VOLUME }}/{{ PROVISIONING_DIR }}"
    PROMETHEUS_TARGETS_DIR: "{{ DOCKER_VOLUME }}/{{ PROMETHEUS_TARGETS_DIR }}"
    PROMETHEUS_CONFIG: "{{ DOCKER_VOLUME }}/monitoring/prometheus/prometheus.yml"

- name: Copy monitoring directory to target
  ansible.builtin.synchronize:
    src: "{{ playbook_dir }}/../monitoring/"
    dest: "{{ DOCKER_VOLUME }}/monitoring/"
    recursive: yes
    delete: no

# =============================================================================
# Prometheus Targets
# =============================================================================

- name: Create Prometheus target for FastAPI app
  copy:
    dest: "{{ PROMETHEUS_TARGETS_DIR }}/fastapi.json"
    content: |
      [
        {
          "targets": ["{{ APP_NAME }}-{{ new_active_color }}:80"],
          "labels": {
            "service": "fastapi"
          }
        }
      ]

- name: Create Node Exporter Prometheus target
  copy:
    dest: "{{ PROMETHEUS_TARGETS_DIR }}/node_exporter.yml"
    content: |
      - targets: ["{{ NODE_EXPORTER_CONTAINER }}:9100"]
        labels:
          job: node_exporter

# =============================================================================
# Pull Images
# =============================================================================

- name: Pull Prometheus image
  community.docker.docker_image:
    name: prom/prometheus
    source: pull

- name: Pull Grafana image
  community.docker.docker_image:
    name: grafana/grafana
    source: pull

- name: Pull Node Exporter image
  community.docker.docker_image:
    name: quay.io/prometheus/node-exporter:latest
    source: pull

# =============================================================================
# Start Prometheus & Node Exporter
# =============================================================================

- name: Start Prometheus container
  community.docker.docker_container:
    name: "{{ PROMETHEUS_CONTAINER }}"
    image: prom/prometheus
    state: started
    restart_policy: always
    recreate: true
    networks:
      - name: "{{ MONITORING_NETWORK }}"
    ports:
      - "{{ PROMETHEUS_PORT }}:9090"
    volumes:
      - "{{ PROMETHEUS_CONFIG }}:/etc/prometheus/prometheus.yml:ro"
      - "{{ PROMETHEUS_TARGETS_DIR }}:/etc/prometheus/targets:ro"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--web.external-url=https://{{ DOMAIN }}/prometheus/"
      - "--web.route-prefix=/"

- name: Start Node Exporter container
  community.docker.docker_container:
    name: "{{ NODE_EXPORTER_CONTAINER }}"
    image: quay.io/prometheus/node-exporter:latest
    state: started
    restart_policy: always
    recreate: true
    networks:
      - name: "{{ MONITORING_NETWORK }}"
    ports:
      - "{{ NODE_EXPORTER_PORT }}:9100"

# =============================================================================
# Wait for Prometheus to be ready
# =============================================================================

- name: Wait for Prometheus to be ready
  uri:
    url: "http://localhost:{{ PROMETHEUS_PORT }}/-/ready"
    status_code: 200
  register: prom_ready
  retries: 15
  delay: 3
  until: prom_ready.status == 200

# =============================================================================
# Arrange Dashboards To Align with Grafana Version
# =============================================================================

- name: Copy arrange script
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../scripts/arrange_dashboards.sh"
    dest: /home/ec2-user/arrange_dashboards.sh
    mode: '0755'

- name: Rearrange dashboards for Grafana
  ansible.builtin.shell: bash /home/ec2-user/arrange_dashboards.sh
  become: yes

# =============================================================================
# Start Grafana
# =============================================================================

- name: Start Grafana container
  community.docker.docker_container:
    name: "{{ GRAFANA_CONTAINER }}"
    image: grafana/grafana
    state: started
    restart_policy: always
    recreate: true
    networks:
      - name: "{{ MONITORING_NETWORK }}"
    ports:
      - "{{ GRAFANA_PORT }}:3000"
    env:
      GF_SECURITY_ADMIN_USER: "{{ GRAFANA_USER }}"
      GF_SECURITY_ADMIN_PASSWORD: "{{ GRAFANA_PASS }}"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
      GF_SERVER_ROOT_URL: "https://{{ DOMAIN }}/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_SERVER_DOMAIN: "{{ DOMAIN }}"
      GF_USERS_DEFAULT_THEME: "dark"
    volumes:
      - "{{ PROVISIONING_DIR }}:/etc/grafana/provisioning:ro"
      - "{{ DASHBOARDS_DIR }}:/var/lib/grafana/dashboards"

- name: Wait for Grafana to be ready
  uri:
    url: "http://localhost:{{ GRAFANA_PORT }}/api/health"
    user: "{{ GRAFANA_USER }}"
    password: "{{ GRAFANA_PASS }}"
    status_code: 200
  register: graf_ready
  retries: 20
  delay: 3
  until: graf_ready.status == 200

# =============================================================================
# Provision dashboards via API if missing
# =============================================================================

- name: Check if Node Exporter dashboard exists
  uri:
    url: "http://localhost:{{ GRAFANA_PORT }}/api/search?query=Node"
    user: "{{ GRAFANA_USER }}"
    password: "{{ GRAFANA_PASS }}"
    return_content: yes
  register: grafana_dashboards

- name: Debug Node_Exporter missing
  ansible.builtin.debug:
    msg: "'Node Exporter Full' NOT Found"
  when: "'Node Exporter Full' not in grafana_dashboards.content"

- name: Provision Node Exporter dashboard via API if missing
  ansible.builtin.shell: |
    curl -s -u {{ GRAFANA_USER }}:{{ GRAFANA_PASS }} \
      -X POST http://localhost:{{ GRAFANA_PORT }}/api/dashboards/db \
      -H "Content-Type: application/json" \
      -d @{{ DASHBOARDS_DIR }}/node_exporter.json
  when: "'Node Exporter Full' not in grafana_dashboards.content"
